<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <title>NadeNade Kitaro 🐱</title>
    <link href="./css/petpet.css" rel="stylesheet" />
  </head>
  <body>
    <main class="card">
      <h1>NADENADE KITARO 🐱</h1>
      <p class="guide">
        마우스 또는 손가락을 좌우로 움직여 쓰다듬어 보세요.
        <br />
        マウスや指を左右に動かして、なでなでしてみてください。
      </p>
      <div class="pet_zone" id="petZone" aria-label="동물 쓰다듬기 영역">
        <span class="img-normal">
          <img
            src="./asset/kitaro1.jpg"
            width="900"
            height="900"
            alt="Normal Kitaro"
          />
        </span>
        <span class="img-happy">
          <img
            src="./asset/kitaro2.jpg"
            width="900"
            height="900"
            alt="Happy Kitaro"
          />
        </span>
      </div>
      <div class="area_count">
        <strong class="count">
          👋
          <b id="petCount" class="number">0</b>
        </strong>
      </div>
    </main>
    <script src="./js/script.js"></script>
  </body>
</html>
